# Apache vhost for the Urlaubs-Planer — terminates TLS on :443 using Laragon's
# existing self-signed cert (which already includes the SAN DNS:Kalender.test)
# and reverse-proxies to the Next production server on 127.0.0.1:3000.
#
# Place on the SERVER in Laragon's Apache config, e.g.
#   C:\laragon\etc\apache2\sites-enabled\Kalender.test.conf
# then reload Apache (Laragon menu → Apache → Reload, or httpd -k restart).
#
# Requires these modules active (uncomment the LoadModule lines in
# C:\laragon\bin\apache\<ver>\conf\httpd.conf if needed):
#   mod_ssl, mod_proxy, mod_proxy_http, mod_headers
#
# Cert/key paths below are Laragon's defaults — VERIFY them against your install
# (Laragon menu → Apache → ssl, or look under C:\laragon\etc\ssl\).
#
# See docs/DEPLOY.md → "Production hardening" for the full ordered runbook.

<VirtualHost *:443>
    ServerName Kalender.test

    SSLEngine on
    SSLCertificateFile    "C:/laragon/etc/ssl/laragon.crt"
    SSLCertificateKeyFile "C:/laragon/etc/ssl/laragon.key"

    # Forward the original Host and tell the app the edge is HTTPS.
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    # Backend is plain HTTP on localhost — no SSLProxyEngine needed.
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/
</VirtualHost>
