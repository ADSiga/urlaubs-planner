# Default SSL vhost for the Urlaubs-Planer on 192.168.2.12.
#
# Serves a cert whose SAN includes IP:192.168.2.12 (so https://192.168.2.12 works
# directly — no hostname needed) and reverse-proxies to the Next prod server on
# 127.0.0.1:3000.
#
# WHY THE FILENAME / "default vhost": a browser hitting a bare IP sends no SNI,
# so Apache serves the FIRST (default) *:443 vhost it parses. Apache parses
# sites-enabled\*.conf in alphabetical order, and Laragon's own default vhost is
# `00-default.conf`. This file must sort BEFORE that (`00-aaa-...` < `00-default`)
# so OUR vhost becomes the no-SNI default; Laragon's *.test sites still match by
# SNI hostname and keep their laragon cert untouched. Place at
#   C:\laragon\etc\apache2\sites-enabled\00-aaa-urlaube-ssl.conf
# and reload Apache. Verify it is actually the default with (no -servername!):
#   openssl s_client -connect 192.168.2.12:443 </dev/null | openssl x509 -noout -subject
# -> must print  subject=O=Urlaube, CN=192.168.2.12
#
# Cert material (generated off-box; keys are secret — transferred by FTP, never git):
#   urlaube.crt / urlaube.key  -> on this server at the paths below
#   urlaube-ca.crt             -> the local CA; import on each client to drop the warning
# Requires modules: mod_ssl, mod_proxy, mod_proxy_http, mod_headers.

<VirtualHost *:443>
    ServerName 192.168.2.12
    ServerAlias Kalender.test localhost

    SSLEngine on
    SSLCertificateFile      "C:/laragon/etc/ssl/urlaube.crt"
    SSLCertificateKeyFile   "C:/laragon/etc/ssl/urlaube.key"
    SSLCertificateChainFile "C:/laragon/etc/ssl/urlaube-ca.crt"

    # Forward original Host and tell the app the edge is HTTPS.
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    # Backend is plain HTTP on localhost — no SSLProxyEngine needed.
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/
</VirtualHost>
